# TMUX CONFIGURATION

## Terminal / truecolor
set-option -g default-terminal "tmux-256color"
set-option -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,xterm-ghostty:RGB,ghostty:RGB,xterm-kitty:RGB,kitty:RGB,xterm-256color:RGB,tmux-256color:RGB"
set-option -g terminal-overrides "linux*:AX@,xterm-ghostty:RGB,ghostty:RGB,xterm-kitty:RGB,kitty:RGB,xterm-256color:RGB,tmux-256color:RGB"
set -gq allow-passthrough on
## Directory containing this tmux.conf. Keep scripts portable across machines.
set -gF @tmux_config_dir "#{d:current_file}"
set -g extended-keys on
set -g extended-keys-format csi-u

## Core behavior
set -g prefix C-b
bind-key C-b send-prefix
unbind-key -q C-space
set -sg escape-time 0
set -g mouse on
set-window-option -g mode-keys vi
set -g visual-activity off

## Windows / panes
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

## Key bindings
# Mostly default tmux prefix: C-b
# Custom: create a new window after the current one and keep the current path.
bind-key c new-window -a -c "#{pane_current_path}"
bind-key % split-window -h
bind-key '"' split-window -v
# Custom preference: kill pane immediately without confirmation.
bind-key x kill-pane
bind-key z resize-pane -Z

# Custom sessionizer on prefix+f; keep default find-window on prefix+F.
bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"
bind-key F command-prompt -p find-window 'find-window -Z -- "%%"'

# Window navigation / movement.
bind-key -n S-Left previous-window
bind-key -n S-Right next-window
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# Pane resizing. This replaces default prefix+l, so last-window is on prefix+C-l.
bind-key C-l last-window
bind-key -r h resize-pane -L 5
bind-key -r j resize-pane -D 5
bind-key -r k resize-pane -U 5
bind-key -r l resize-pane -R 5

# Paste the current Wayland clipboard into this pane.
bind-key v run-shell "#{@tmux_config_dir}/scripts/paste-wayland-clipboard.sh '#{pane_id}'"

# Clear stale custom bindings when sourcing over an existing tmux server.
unbind-key -q '\'
unbind-key -q -n M-Left
unbind-key -q -n M-Right
unbind-key -q -n M-Up
unbind-key -q -n M-Down
unbind-key -q v

## Copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; fi"
unbind-key -q -T copy-mode-vi MouseDragEnd1Pane

## Status line
set -g status-position bottom
set -g status-interval 60
set -g status-left ""
set -g status-right-length 100
set -g status-left-length 100
set -g status-right "#[fg=default,bg=default]#H  #(#{@tmux_config_dir}/scripts/battery-status.sh) "
set -g status-style fg=default,bg=default
set -g window-status-separator ""
set -g window-status-format "#[fg=colour8,bg=default]  #I:#W  "
set -g window-status-current-format "#[fg=default,bg=default]  #I:#W  "
set -g window-status-style fg=colour8,bg=default
set -g window-status-current-style fg=default,bg=default
set -g window-style bg=default
set -g window-active-style bg=default
set -g pane-border-style fg=#2a292d,bg=default
set -g pane-active-border-style fg=#69676c,bg=default
set -g message-style fg=default,bg=default
set -g message-command-style fg=default,bg=default
set -g mode-style fg=black,bg=white

## Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

## Session restore
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

## Initialize TPM
run '~/.config/tmux/tpm_plugin/tpm/tpm'

## Re-apply bindings that plugins may override.
bind-key C-l last-window
bind-key v run-shell "#{@tmux_config_dir}/scripts/paste-wayland-clipboard.sh '#{pane_id}'"
